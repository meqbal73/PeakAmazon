<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer Screen</title>
<!-- مكتبات Firebase المضافة -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
:root {
  --bg:#07090f;--panel:#0f1520;--panel2:#141c2e;--border:#1a2540;
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --future:#ff4d6d;--regular:#60a5fa;--accent:#3b82f6;
  --text:#e8edf5;--muted:#4a5a7a;--green:#22c55e;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
html[dir="ltr"] body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }


/* NO DATA */
#noDataScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px;}
#noDataScreen .big{font-size:64px;}
#noDataScreen h2{font-size:22px;font-weight:900;}
#noDataScreen p{color:var(--muted);font-size:14px;}

/* APP */
#app{display:none;}
.top-bar{background:linear-gradient(180deg,#0d1520 0%,transparent 100%);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;}
.logo .ic{font-size:24px;}
.logo h1{font-size:18px;font-weight:900;}
.view-badge{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--green);font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;}
.top-right {display:flex; align-items:center; gap:10px;}
.lang-btn { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 14px; border-radius: 20px; font-weight: 700; cursor: pointer;}

.date-row{padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--panel);}
.dpill{background:transparent;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--muted);cursor:pointer;}
.dpill.active{background:var(--accent);border-color:var(--accent);color:white;}

.tabs{display:flex;padding:18px 24px 0;gap:8px;}
.tab{padding:9px 24px;border-radius:12px 12px 0 0;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--border);border-bottom:none;background:var(--panel2);color:var(--muted);}
.tab.active{background:rgba(255,215,0,.08);border-color:var(--gold);color:var(--gold);}

.page{display:none;border-top:2px solid var(--border);padding:24px; border-top-color:var(--gold);}
.page.active{display:block;}

.formula-strip{margin:0 24px 18px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 16px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:13px;}
.formula-strip .ftitle{color:var(--red);font-weight:900;}
.neg{color:#ef4444;font-weight:700; background:rgba(239,68,68,.1); padding:2px 8px; border-radius:6px;}

/* Category sections & Podium */
.cat-section{margin-bottom:46px;}
.cat-label{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.cat-dot{width:10px;height:10px;border-radius:50%;}
.cat-label h2{font-size:17px;font-weight:900;}
.wnote{font-size:12px;padding:3px 12px;border-radius:20px;font-weight:700;background:rgba(255,215,0,.1);color:var(--gold);border:1px solid var(--gold);}
html[dir="rtl"] .wnote { margin-right: auto; } html[dir="ltr"] .wnote { margin-left: auto; }

.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px;padding:0 4px;}
.podium-player{flex:1;max-width:190px;display:flex;flex-direction:column;align-items:center;}
.pod-card{width:100%;border-radius:16px 16px 0 0;padding:14px 10px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;}
.p1 .pod-card{background:linear-gradient(160deg,#2a1f00,#1a1200);border:1px solid #ffd70066;border-bottom:none;}
.p2 .pod-card{background:linear-gradient(160deg,#1a1f28,#111720);border:1px solid #c0c0c066;border-bottom:none;}
.p3 .pod-card{background:linear-gradient(160deg,#1c1108,#130c05);border:1px solid #cd7f3266;border-bottom:none;}
.pod-crown{font-size:26px;line-height:1;}
.pod-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;border:3px solid transparent;}
.p1 .pod-avatar{border-color:var(--gold);background:rgba(255,215,0,.12);color:var(--gold);}
.p2 .pod-avatar{border-color:var(--silver);background:rgba(192,192,192,.1);color:var(--silver);}
.p3 .pod-avatar{border-color:var(--bronze);background:rgba(205,127,50,.1);color:var(--bronze);}
.pod-name{font-size:12px;font-weight:700;line-height:1.2;}
.pod-login{font-size:10px;color:var(--muted);}
.pod-score{font-size:18px;font-weight:900;}
.p1 .pod-score{color:var(--gold);}.p2 .pod-score{color:var(--silver);}.p3 .pod-score{color:var(--bronze);}
.pod-score-lbl{font-size:10px;color:var(--muted);}
.pod-base{width:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;border-radius:0 0 8px 8px;}
.p1 .pod-base{height:74px;background:linear-gradient(180deg,#ffd700,#b8860b);color:#000;font-size:30px;}
.p2 .pod-base{height:52px;background:linear-gradient(180deg,#c0c0c0,#808080);color:#000;}
.p3 .pod-base{height:36px;background:linear-gradient(180deg,#cd7f32,#8b4513);color:#000;}

/* ALL TABLE */
.all-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px; text-align:right;}
html[dir="ltr"] table {text-align:left;}
thead tr{background:var(--panel2);border-bottom:2px solid var(--border);}
thead th{padding:10px 14px;font-weight:700;color:var(--muted);font-size:12px;white-space:nowrap;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s;}
tbody tr:hover{background:rgba(255,255,255,.03);}
td{padding:10px 14px;white-space:nowrap;}
.rank-td{font-weight:900;font-size:15px;text-align:center;}
.score-td{font-weight:900;font-size:15px;}
.lvl-badge {font-size:9px; padding:2px 6px; border-radius:6px; margin-top:3px; display:inline-block;}
.lvl1 {background:rgba(255,77,109,.15); color:var(--future); border:1px solid var(--future);}
.lvl2 {background:rgba(96,165,250,.15); color:var(--regular); border:1px solid var(--regular);}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<!-- شاشة العد التنازلي -->
<div id="countdownOverlay"></div>

<div id="noDataScreen">
  <div class="big">⏳</div>
  <h2 class="t-wait-title">في انتظار البيانات</h2>
  <p class="t-wait-sub">سيظهر هنا تلقائياً بمجرد رفع الإدارة للملف</p>
</div>

<div id="app">
  <div class="top-bar">
    <div class="logo">
      <span class="ic">🏆</span>
      <h1 class="t-title">لوحة <span style="color:var(--gold)">المسابقات</span></h1>
      <span class="view-badge t-view-lbl">👁 مشاهدة فقط</span>
    </div>
    <div class="top-right">
      <button class="lang-btn" onclick="toggleLang()">🌐 EN / AR</button>
    </div>
  </div>

  <div class="date-row">
    <span style="font-size:18px">📅</span>
    <div id="datePills"></div>
  </div>

  <div class="formula-strip">
    <span class="ftitle t-calc">🔻 الخصومات:</span>
    <span class="neg">Miss-sort: -50</span>
    <span class="neg">FSAF: -10</span>
  </div>

  <div class="tabs">
    <div class="tab active t-tab-all" onclick="switchTab('all')">📋 جميع المتسابقين</div>
    <div class="tab t-tab-future" onclick="switchTab('future')">🌟 فائزين فيوتشر</div>
  </div>

  <div class="page active" id="pageAll"></div>
  <div class="page" id="pageFuture"></div>
</div>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD0Mnet_aFBNAhidY2cFJ27d4tNTM2F8A8",
  authDomain: "peak-ce9b0.firebaseapp.com",
  projectId: "peak-ce9b0",
  storageBucket: "peak-ce9b0.firebasestorage.app",
  messagingSenderId: "658565788853",
  appId: "1:658565788853:web:bfc3faf8de37e702f9bafc",
  measurementId: "G-7E52WRZT4Q"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- I18N DICTIONARY ---
const DICT = {
  ar: {
    title: 'لوحة <span style="color:var(--gold)">المسابقات</span>',
    viewLbl: '👁 مشاهدة فقط',
    waitTitle: 'في انتظار البيانات',
    waitSub: 'سيظهر هنا تلقائياً بمجرد رفع الإدارة للملف',
    calc: '🔻 الخصومات:',
    tabAll: '📋 جميع المتسابقين',
    tabFuture: '🌟 فائزين فيوتشر',
    all: 'الكل',
    empty: 'لا توجد بيانات',
    pt: 'نقطة',
    noteAll: '🏅 أعلى 3 مراكز',
    noteFuture: '🏅 أعلى 2 (Lvl 1) + أعلى 1 (Lvl 2)',
    // Table Headers
    thRank: '#', thName: 'الاسم', thLogin: 'Login', thLevel: 'Level',
    thMiss: 'Miss-sort', thFsaf: 'FSAF', thPph: 'PPH', thTotal: 'Total Pkg', thScore: 'النقاط'
  },
  en: {
    title: 'Competitions <span style="color:var(--gold)">Dashboard</span>',
    viewLbl: '👁 Viewer Only',
    waitTitle: 'Waiting for Data',
    waitSub: 'Will appear here automatically once Admin uploads the file',
    calc: '🔻 Deductions:',
    tabAll: '📋 All Contestants',
    tabFuture: '🌟 Future Winners',
    all: 'All',
    empty: 'No Data Found',
    pt: 'pt',
    noteAll: '🏅 Top 3 Positions',
    noteFuture: '🏅 Top 2 (Lvl 1) + Top 1 (Lvl 2)',
    // Table Headers
    thRank: '#', thName: 'Name', thLogin: 'Login', thLevel: 'Level',
    thMiss: 'Miss-sort', thFsaf: 'FSAF', thPph: 'PPH', thTotal: 'Total Pkg', thScore: 'Score'
  }
};

let lang = localStorage.getItem('compLang') || 'ar';
function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('compLang', lang);
  applyLang();
  if(allData.length) { buildDatePills(); render(); }
}

function applyLang() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const d = DICT[lang];
  document.querySelectorAll('.t-title').forEach(e=>e.innerHTML=d.title);
  document.querySelector('.t-view-lbl').innerText=d.viewLbl;
  document.querySelector('.t-wait-title').innerText=d.waitTitle;
  document.querySelector('.t-wait-sub').innerText=d.waitSub;
  document.querySelector('.t-calc').innerText=d.calc;
  document.querySelector('.t-tab-all').innerText=d.tabAll;
  document.querySelector('.t-tab-future').innerText=d.tabFuture;
}
applyLang();

const CATS = [
  {key:'induct', label:'Induct', color:'#6366f1'},
  {key:'stow',   label:'Stow',   color:'#f59e0b'},
  {key:'feeder', label:'Feeder', color:'#10b981'},
  {key:'pack',   label:'Pack',   color:'#ec4899'},
];

let allData = [], selectedDate = null;

function buildDatePills(){
  const dates=[...new Set(allData.map(r=>r.date))].filter(Boolean).sort().reverse();
  selectedDate=dates[0]||null;
  const c=document.getElementById('datePills'); c.innerHTML='';
  const allBtn=mkPill(DICT[lang].all,false,()=>{selectedDate=null;setActive(allBtn);render();});
  c.appendChild(allBtn);
  dates.forEach(d=>{
    const btn=mkPill(d,d===selectedDate,()=>{selectedDate=d;setActive(btn);render();});
    c.appendChild(btn);
  });
}
function mkPill(t,a,fn){const b=document.createElement('button');b.className='dpill'+(a?' active':'');b.textContent=t;b.onclick=fn;return b;}
function setActive(el){document.querySelectorAll('.dpill').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector('.t-tab-'+tab).classList.add('active');
  document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}

function render(){
  const fd=selectedDate?allData.filter(r=>r.date===selectedDate):allData;
  renderAll(fd);
  renderFuture(fd);
}

function renderAll(data){
  const page = document.getElementById('pageAll'); page.innerHTML='';
  if(!data.length){page.innerHTML=`<div class="empty">${DICT[lang].empty}</div>`;return;}

  CATS.forEach(cat => {
    let rows = data.filter(r => r.cat === cat.key).sort((a,b) => b.score - a.score);
    if(!rows.length) return;
    
    const top3 = rows.slice(0,3);
    const sec = document.createElement('div'); sec.className='cat-section';
    sec.innerHTML = `<div class="cat-label">
      <div class="cat-dot" style="background:${cat.color}"></div><h2>${cat.label}</h2>
      <span class="wnote">${DICT[lang].noteAll}</span></div>`;
    
    sec.appendChild(buildPodium(top3, cat));

    const wrap = document.createElement('div'); wrap.className = 'all-table-wrap';
    wrap.innerHTML = `<table>
      <thead><tr>
        <th>${DICT[lang].thRank}</th>
        <th>${DICT[lang].thName}</th>
        <th>${DICT[lang].thLogin}</th>
        <th>${DICT[lang].thLevel}</th>
        <th>${DICT[lang].thMiss}</th>
        <th>${DICT[lang].thFsaf}</th>
        <th>${DICT[lang].thPph}</th>
        <th>${DICT[lang].thTotal}</th>
        <th>${DICT[lang].thScore}</th>
      </tr></thead>
      <tbody>
        ${rows.map((p,i) => `<tr>
          <td class="rank-td">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
          <td style="font-weight:700">${p.name}</td>
          <td style="color:var(--muted);font-size:13px">${p.login||'—'}</td>
          <td><span class="lvl-badge ${p.level===1?'lvl1':'lvl2'}">Lvl ${p.level}</span></td>
          <td style="color:${p.misssort>0?'var(--red)':'var(--muted)'}">${p.misssort}</td>
          <td style="color:${p.fsaf>0?'var(--red)':'var(--muted)'}">${p.fsaf}</td>
          <td>${p.pph}</td>
          <td>${p.totalpkg}</td>
          <td class="score-td" style="color:${p.score>=100?'var(--green)':'var(--red)'}">${p.score.toFixed(2)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    sec.appendChild(wrap);
    page.appendChild(sec);
  });
  if(!page.children.length) page.innerHTML=`<div class="empty">${DICT[lang].empty}</div>`;
}

function renderFuture(data){
  const page = document.getElementById('pageFuture'); page.innerHTML='';
  if(!data.length){page.innerHTML=`<div class="empty">${DICT[lang].empty}</div>`;return;}

  CATS.forEach(cat => {
    let lvl1 = data.filter(r => r.cat === cat.key && r.level === 1).sort((a,b) => b.score - a.score);
    let lvl2 = data.filter(r => r.cat === cat.key && r.level === 2).sort((a,b) => b.score - a.score);
    
    let futureWinners = [lvl1[0], lvl2[0], lvl1[1]]; 
    
    if(!futureWinners.some(Boolean)) return; 

    const sec = document.createElement('div'); sec.className='cat-section';
    sec.innerHTML = `<div class="cat-label">
      <div class="cat-dot" style="background:${cat.color}"></div><h2>${cat.label}</h2>
      <span class="wnote">${DICT[lang].noteFuture}</span></div>`;
    
    sec.appendChild(buildPodium(futureWinners, cat, true));
    page.appendChild(sec);
  });
  if(!page.children.length) page.innerHTML=`<div class="empty">${DICT[lang].empty}</div>`;
}

function buildPodium(players, cat, isFuture=false){
  const order=[players[1],players[0],players[2]];
  const posC=['p2','p1','p3'],crowns=['🥈','🥇','🥉'],bases=['2','1','3'];
  const wrap=document.createElement('div');wrap.className='podium-wrap';
  order.forEach((p,vi)=>{
    if(!p) return;
    const init=p.name.split(/[ ,]/).map(w=>w[0]).slice(0,2).join('');
    const div=document.createElement('div');div.className=`podium-player ${posC[vi]}`;
    div.innerHTML=`<div class="pod-card">
      <span class="pod-crown">${crowns[vi]}</span>
      <div class="pod-avatar">${init||'?'}</div>
      <div class="pod-name">${p.name}</div>
      <div class="pod-login">${p.login||'—'}</div>
      <span class="lvl-badge ${p.level===1?'lvl1':'lvl2'}">Lvl ${p.level}</span>
      <div class="pod-score" style="margin-top:5px">${p.score.toFixed(2)}</div>
      <div class="pod-score-lbl">${DICT[lang].pt}</div>
    </div><div class="pod-base">${bases[vi]}</div>`;
    wrap.appendChild(div);
  });
  return wrap;
}

// الاستماع للبيانات من Firebase بدلاً من LocalStorage
db.ref('competitionsData').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data && data.length > 0) {
        const overlay = document.getElementById('countdownOverlay');
        overlay.style.display = 'flex';
        let count = 3;
        overlay.innerText = count;
        
        const interval = setInterval(() => {
            count--;
            if(count > 0) {
                overlay.innerText = count;
            } else {
                clearInterval(interval);
                overlay.innerText = "GO! 🎉";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    allData = data;
                    buildDatePills(); 
                    render();
                    document.getElementById('noDataScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }, 800);
            }
        }, 1000);
    }
});
</script>
</body>
</html>
