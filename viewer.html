<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer Screen</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<style>
    /* حافظت على تنسيقاتك الأصلية كما هي */
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    :root { --bg:#07090f; --gold:#ffd700; --accent:#3b82f6; --muted:#4a5a7a; }
    body { font-family:'Tajawal',sans-serif; background:var(--bg); color:white; min-height:100vh; }
    
    /* إضافة تنسيق العد التنازلي */
    #countdownOverlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(7, 9, 15, 0.95); z-index: 9999; 
        display: none; align-items: center; justify-content: center; 
        font-size: 150px; font-weight: 900; color: var(--gold);
    }
    #app { display: none; }
</style>
</head>
<body>

<!-- شاشة العد التنازلي -->
<div id="countdownOverlay"></div>

<div id="noDataScreen">
    <div class="big">⏳</div>
    <h2>في انتظار البيانات...</h2>
</div>

<div id="app">
    <!-- هنا ضع كامل محتوى الـ HTML الخاص بالعرض الذي كان عندك سابقاً -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0Mnet_aFBNAhidY2cFJ27d4tNTM2F8A8",
        authDomain: "peak-ce9b0.firebaseapp.com",
        projectId: "peak-ce9b0",
        storageBucket: "peak-ce9b0.firebasestorage.app",
        messagingSenderId: "658565788853",
        appId: "1:658565788853:web:bfc3faf8de37e702f9bafc",
        measurementId: "G-7E52WRZT4Q"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // الاستماع للتحديثات من السحابة
    db.ref('competitionsData').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            startCountdown(data);
        }
    });

    function startCountdown(data) {
        const overlay = document.getElementById('countdownOverlay');
        overlay.style.display = 'flex';
        let count = 3;
        overlay.innerText = count;

        const interval = setInterval(() => {
            count--;
            if(count > 0) {
                overlay.innerText = count;
            } else {
                clearInterval(interval);
                overlay.innerText = "GO! 🎉";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    // تحديث البيانات وعرضها
                    allData = data;
                    buildDatePills(); 
                    render();
                    document.getElementById('noDataScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }, 800);
            }
        }, 1000);
    }
</script>
</body>
</html>
