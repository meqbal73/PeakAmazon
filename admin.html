<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- إضافة مكتبة Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<style>
/* ... هنا تنسيقاتك الأصلية كما هي ... */
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
:root { --bg:#07090f;--panel:#0f1520;--panel2:#141c2e;--border:#1a2540; --gold:#ffd700; --accent:#3b82f6; --text:#e8edf5; --green:#22c55e; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.upload-box{background:var(--panel);border:2px dashed var(--border);border-radius:20px;padding:36px;text-align:center;width:100%;max-width:440px;margin:50px auto;}
.up-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;padding:10px 28px;border-radius:10px;color:white;font-weight:700;cursor:pointer;}
.publish-btn { background: var(--green); border: none; color: white; padding: 10px 28px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; display: none; }
</style>
</head>
<body>

<div id="uploadScreen">
  <div class="upload-box">
    <h1>لوحة الإدارة</h1>
    <button class="up-btn" onclick="document.getElementById('fileInput').click()">اختر ملف الإكسل</button>
    <input type="file" id="fileInput" accept=".xlsx" style="display:none" onchange="processFile(this.files[0])">
    <!-- زر النشر الجديد -->
    <button id="publishBtn" class="publish-btn" onclick="publishResults()">نشر النتائج للقروب 🚀</button>
  </div>
</div>

<script>
// إعدادات Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD0Mnet_aFBNAhidY2cFJ27d4tNTM2F8A8",
  authDomain: "peak-ce9b0.firebaseapp.com",
  projectId: "peak-ce9b0",
  storageBucket: "peak-ce9b0.firebasestorage.app",
  messagingSenderId: "658565788853",
  appId: "1:658565788853:web:bfc3faf8de37e702f9bafc",
  measurementId: "G-7E52WRZT4Q"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let allData = [];

function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(e.target.result,{type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:0});
        // --- هنا ضع منطق المعالجة الخاص بك ---
        allData = rows; 
        document.getElementById('publishBtn').style.display = 'inline-block';
        alert("تم رفع الملف! اضغط على زر النشر الآن.");
    };
    reader.readAsArrayBuffer(file);
}

function publishResults() {
    const btn = document.getElementById('publishBtn');
    btn.textContent = "جاري النشر...";
    db.ref('competitionsData').set(allData).then(() => {
        alert("تم إرسال البيانات للقروب بنجاح! 🎉");
        btn.textContent = "نشر النتائج (Publish) 🚀";
    });
}
</script>
</body>
</html>
