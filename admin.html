<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
:root {
  --bg:#07090f;--panel:#0f1520;--panel2:#141c2e;--border:#1a2540;
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --future:#ff4d6d;--regular:#60a5fa;--accent:#3b82f6;
  --text:#e8edf5;--muted:#4a5a7a;--green:#22c55e;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
html[dir="ltr"] body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

/* UPLOAD */
#uploadScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:32px;background:radial-gradient(ellipse at 50% 0%,#0d1b3e 0%,#07090f 60%);}
.upload-hero{text-align:center;}
.upload-hero .trophy{font-size:64px;margin-bottom:12px;filter:drop-shadow(0 0 30px #ffd70066);}
.admin-badge{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:8px;display:inline-block;}
.upload-box{background:var(--panel);border:2px dashed var(--border);border-radius:20px;padding:36px 48px;text-align:center;cursor:pointer;transition:all .2s;width:100%;max-width:440px;}
.upload-box:hover,.upload-box.drag{border-color:var(--accent);background:rgba(59,130,246,.06);}
.up-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;padding:10px 28px;border-radius:10px;color:white;font-size:15px;font-weight:700;cursor:pointer;}
#fileInput{display:none;}

/* APP */
#app{display:none;}
.top-bar{background:linear-gradient(180deg,#0d1520 0%,transparent 100%);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;}
.top-right{display:flex;align-items:center;gap:8px;}
.hbtn{background:transparent;border:1px solid var(--border);padding:5px 14px;border-radius:20px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
.publish-btn { background: var(--green); border: none; color: white; padding: 5px 14px; border-radius: 20px; font-weight: 700; cursor: pointer; }
.lang-btn { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 14px; border-radius: 20px; font-weight: 700; cursor: pointer;}
</style>
</head>
<body>

<div id="uploadScreen">
  <div class="upload-hero">
    <div class="trophy">🏆</div>
    <span class="admin-badge">🔐 لوحة الإدارة</span>
    <h1>لوحة المسابقات</h1>
    <p>ارفع ملف الإكسل لتجهيز البيانات قبل النشر</p>
  </div>
  <div class="upload-box" id="uploadBox">
    <h2>📊 ارفع ملف الإكسل</h2>
    <button class="up-btn" onclick="document.getElementById('fileInput').click()">اختر ملف</button>
    <input type="file" id="fileInput" accept=".xlsx">
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="logo">🏆 <h1>لوحة المسابقات</h1></div>
    <div class="top-right">
      <button class="lang-btn" onclick="toggleLang()">🌐 EN / AR</button>
      <button id="publishBtn" class="publish-btn" onclick="publishResults()">نشر النتائج (Publish) 🚀</button>
      <button class="hbtn" onclick="location.reload()">↑ ملف جديد</button>
    </div>
  </div>
  <!-- باقي التنسيقات والـ HTML الخاص بالعرض نفس ما كان عندك -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD0Mnet_aFBNAhidY2cFJ27d4tNTM2F8A8",
        authDomain: "peak-ce9b0.firebaseapp.com",
        projectId: "peak-ce9b0",
        storageBucket: "peak-ce9b0.firebasestorage.app",
        messagingSenderId: "658565788853",
        appId: "1:658565788853:web:bfc3faf8de37e702f9bafc",
        measurementId: "G-7E52WRZT4Q"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allData = [];

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = e => {
            const wb = XLSX.read(e.target.result, {type:'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:0});
            allData = rows.map(r => { /* نفس معالجتك للبيانات */ return r; });
            document.getElementById('uploadScreen').style.display='none';
            document.getElementById('app').style.display='block';
        };
        reader.readAsArrayBuffer(file);
    }

    function publishResults() {
        const btn = document.getElementById('publishBtn');
        btn.textContent = "جاري النشر...";
        db.ref('competitionsData').set(allData).then(() => {
            alert("تم نشر النتائج بنجاح! سيتحدث عرض الشباب فوراً 🚀");
            btn.textContent = "نشر النتائج (Publish) 🚀";
        });
    }
</script>
</body>
</html>
